<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cally-D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background particles */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .subtitle {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      backdrop-filter: blur(12px);
      max-width: 500px;
      margin: 0 auto;
    }

    .card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #ffd200;
    }

    .card p {
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #0f0c29;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 210, 0, 0.3);
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 3rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
    }

    .footer a {
      color: rgba(255, 210, 0, 0.6);
      text-decoration: none;
    }

    .footer a:hover {
      color: #ffd200;
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="container">
    <h1>Cally-D</h1>
    <p class="subtitle">Welcome to my GitHub Page</p>

    <div class="card">
      <h2>Hello, World!</h2>
      <p>
        This is a sample GitHub Pages site for the
        <strong>cally-D</strong> repository.
        Feel free to customize this page and make it your own.
      </p>
      <a class="btn" href="https://github.com/fransbell/cally-D">View on GitHub</a>
    </div>
  </div>

  <div class="footer">
    Hosted on <a href="https://pages.github.com">GitHub Pages</a>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      const size = Math.random() * 8 + 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (Math.random() * 8 + 6) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>

</body>
</html>
